plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.appmover'
    compileSdk 33

    defaultConfig {
        applicationId "com.example.appmover"
        minSdk 21
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }

    buildFeatures {
        viewBinding true
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.recyclerview:recyclerview:1.3.0'
}
