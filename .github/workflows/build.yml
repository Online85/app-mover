name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Download Gradle Wrapper files
      run: |
        # Скачиваем gradlew
        wget -O gradlew https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradlew
        wget -O gradlew.bat https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradlew.bat
        # Создаем папку
        mkdir -p gradle/wrapper
        # Скачиваем gradle-wrapper.jar (ЭТОТ ШАГ!)
        wget -O gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.0.0/gradle/wrapper/gradle-wrapper.jar
        # Скачиваем properties
        wget -O gradle/wrapper/gradle-wrapper.properties https://raw.githubusercontent.com/gradle/gradle/v8.0.0/gradle/wrapper/gradle-wrapper.properties
        # Даем права
        chmod +x gradlew
    
    - name: Build APK
      run: |
        ./gradlew assembleDebug --no-daemon
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
